services:
  bee-geo-web:
    image: nginx:1.27-alpine
    container_name: bee-geo-web
    ports:
      - "8080:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bee-geo-backend

  bee-geo-backend:
    image: eclipse-temurin:17-jre
    container_name: bee-geo-backend
    working_dir: /app
    command: ["java", "-jar", "bee-geo-backend.jar"]
    volumes:
      - ../backend/target/bee-geo-backend-0.1.0.jar:/app/bee-geo-backend.jar:ro
    environment:
      SPRING_PROFILES_ACTIVE: prod
      BEE_GEO_DB_URL: jdbc:postgresql://bee-geo-postgres:5432/bee_geo
      BEE_GEO_DB_USERNAME: ${BEE_GEO_DB_USERNAME:-bee_geo}
      BEE_GEO_DB_PASSWORD: ${BEE_GEO_DB_PASSWORD:?请设置生产数据库密码}
      BEE_GEO_CREDENTIAL_SECRET: ${BEE_GEO_CREDENTIAL_SECRET:?请设置生产凭据加密密钥}
      BEE_GEO_SEED_DEMO_CREDENTIALS: "false"
      BEE_GEO_REQUIRE_OPERATOR_HEADER: "true"
    depends_on:
      - bee-geo-postgres
      - bee-geo-redis

  bee-geo-postgres:
    image: postgres:16-alpine
    container_name: bee-geo-postgres
    environment:
      POSTGRES_DB: bee_geo
      POSTGRES_USER: ${BEE_GEO_DB_USERNAME:-bee_geo}
      POSTGRES_PASSWORD: ${BEE_GEO_DB_PASSWORD:?请设置生产数据库密码}
    volumes:
      - bee-geo-postgres-data:/var/lib/postgresql/data
      - ./sql/postgresql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  bee-geo-redis:
    image: redis:7-alpine
    container_name: bee-geo-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - bee-geo-redis-data:/data

  bee-geo-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: bee-geo-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: beegeo
      MINIO_ROOT_PASSWORD: beegeo-private-change-me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - bee-geo-minio-data:/data

volumes:
  bee-geo-postgres-data:
  bee-geo-redis-data:
  bee-geo-minio-data:
