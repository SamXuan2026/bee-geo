services:
  bee-geo-web:
    image: nginx:1.27-alpine
    container_name: bee-geo-web
    ports:
      - "8080:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bee-geo-backend

  bee-geo-backend:
    image: eclipse-temurin:17-jre
    container_name: bee-geo-backend
    working_dir: /app
    command: ["java", "-jar", "bee-geo-backend.jar"]
    volumes:
      - ../backend/target/bee-geo-backend-0.1.0.jar:/app/bee-geo-backend.jar:ro
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - bee-geo-redis

  bee-geo-redis:
    image: redis:7-alpine
    container_name: bee-geo-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - bee-geo-redis-data:/data

  bee-geo-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: bee-geo-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: beegeo
      MINIO_ROOT_PASSWORD: beegeo-private-change-me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - bee-geo-minio-data:/data

volumes:
  bee-geo-redis-data:
  bee-geo-minio-data:
